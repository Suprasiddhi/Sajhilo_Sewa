services:
  db:
    image: postgres:16-alpine
    container_name: sajhilo-sewa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sajhilosewadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sajhilosewadb"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./sajhilo-sewa-backend
      dockerfile: Dockerfile
    container_name: sajhilo-sewa-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sajhilosewadb
    ports:
      - "8000:8000"
    volumes:
      - ./sajhilo-sewa-backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./sajhilo-sewa-frontend
      dockerfile: Dockerfile
    container_name: sajhilo-sewa-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_API_BASE_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws/recognition
    ports:
      - "3000:3000"
    volumes:
      - ./sajhilo-sewa-frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
